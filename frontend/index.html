<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor de Recursos</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app" class="drag-region">

    <!-- Drag handle -->
    <div class="drag-handle drag-region">
      <div class="grip-dots"></div>
    </div>

    <!-- Metric cards (built dynamically by JS) -->
    <div id="grid" class="grid"></div>

    <div class="footer drag-region">
      <button class="gear no-drag" id="settingsBtn" title="Configurações">⚙</button>
      <div class="resize-grip"></div>
    </div>
  </div>

  <!-- Settings overlay -->
  <div id="ctxMenu" class="ctx-menu hidden no-drag" onclick="event.stopPropagation()">
    <div class="ctx-header">
      <span class="ctx-title">Configurações</span>
      <button class="ctx-close" id="closeSettings">✕</button>
    </div>

    <div class="ctx-section">Geral</div>
    <div class="ctx-row">
      <label>Opacidade</label>
      <input type="range" id="opacitySlider" min="10" max="100" value="85" />
      <span id="opacityVal">85%</span>
    </div>
    <div class="ctx-row">
      <label>Intervalo (s)</label>
      <input type="number" id="intervalInput" min="1" max="60" value="1" />
    </div>
    <div class="ctx-row">
      <label>Sempre no topo</label>
      <input type="checkbox" id="alwaysOnTop" checked />
    </div>

    <div class="ctx-sep"></div>
    <div class="ctx-section">Visibilidade</div>
    <div class="ctx-row"><label>CPU</label>        <input type="checkbox" id="visCPU"     checked /></div>
    <div class="ctx-row"><label>RAM</label>         <input type="checkbox" id="visRAM"     checked /></div>
    <div class="ctx-row"><label>Swap</label>        <input type="checkbox" id="visSwap"    checked /></div>
    <div class="ctx-row"><label>Temperatura</label> <input type="checkbox" id="visTemp"    checked /></div>
    <div class="ctx-row"><label>Discos</label>      <input type="checkbox" id="visDisk"    checked /></div>
    <div class="ctx-row"><label>Rede ↑</label>      <input type="checkbox" id="visNetUp"   checked /></div>
    <div class="ctx-row"><label>Rede ↓</label>      <input type="checkbox" id="visNetDown" checked /></div>
    <div class="ctx-row"><label>GPU</label>         <input type="checkbox" id="visGPU"     checked /></div>
    <div class="ctx-row"><label>Bateria</label>     <input type="checkbox" id="visBattery" checked /></div>

    <div class="ctx-sep"></div>
    <div class="ctx-section">Limites de alerta</div>
    <div class="ctx-row"><label>CPU</label>      <span class="ctx-unit">%</span>  <input type="number" id="threshCpu"  min="1" max="100" value="90" /></div>
    <div class="ctx-row"><label>RAM</label>      <span class="ctx-unit">%</span>  <input type="number" id="threshRam"  min="1" max="100" value="85" /></div>
    <div class="ctx-row"><label>Disco</label>    <span class="ctx-unit">%</span>  <input type="number" id="threshDisk" min="1" max="100" value="90" /></div>
    <div class="ctx-row"><label>Temp</label>     <span class="ctx-unit">°C</span> <input type="number" id="threshTemp" min="1" max="120" value="80" /></div>
    <div class="ctx-row"><label>Bateria</label>  <span class="ctx-unit">%</span>  <input type="number" id="threshBat"  min="1" max="50"  value="15" /></div>

    <div class="ctx-sep"></div>
    <div class="ctx-btn" id="saveBtn">Salvar</div>
    <div class="ctx-btn ctx-quit" id="quitBtn">Fechar app</div>
  </div>

  <script src="/main.js"></script>
</body>
</html>
